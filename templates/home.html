{% extends "base.html" %}

{% block title %}Home{% endblock title %}

{% block content %}
{% if user.is_authenticated %}
<p>Hi {{ user.username }}, You are currently {{ user.age }} year{{user.age|pluralize}} old</p>
<form action="{% url "logout" %}" method="post">
    {% csrf_token %}
    <button class="btn btn-success ms-2" type="submit">Log Out</button>
</form>
{% endif %}
{% endblock content %}
