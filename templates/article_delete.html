{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Delete Article{% endblock title %}

{% block content %}
<h1>Delete</h1>
<form action="" method="post">
    {% csrf_token %}
    <p>Are you sure you want to delete "{{ article.title }}"</p>
    {{ form|crispy }}
    <button class="btn btn-danger ms-2" type="submit">Delete</button>
</form>
{% endblock content %}
