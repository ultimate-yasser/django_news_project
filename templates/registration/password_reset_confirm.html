{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}Password Reset{% endblock title %}

{% block content %}
<h1>Password Reset</h1>
<p>Enter Your New Password</p>

<form action="" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <input class="btn btn-success" type="submit" value="Change Password">
</form>
{% endblock content %}
