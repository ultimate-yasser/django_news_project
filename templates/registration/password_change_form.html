{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Password Change{% endblock title %}

{% block content %}
<h1>Password Change Form</h1>
<p>Please Enter your old password for securit's sake then enter your new password twice. </p>
<form action="" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <input class="btn btn-success" type="submit" value="Change My Password">
</form>
{% endblock content %}
